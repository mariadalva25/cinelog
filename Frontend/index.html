<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CineLog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4" style="max-width: 1200px;">
    
    <header class="mb-4">
  <h1 class="h3">
    CineLog
   <i class="bi bi-camera-reels"></i>
  </h1>

  <p class="text-muted">
    "Registre o seu filme favorito e comente para que mais pessoas o conheçam!"
  </p>

  <div id="alerta" class="alert alert-danger d-none" role="alert"></div>
</header>

    <div class="row g-4">
      
      <!-- ===================== USUÁRIO (Criar Cadastro) ===================== -->
      <section class="col-md-4">
        <div class="card h-100">
          <div class="card-header bg-dark text-white fw-bold">Cadastrar Usuário</div>
          <div class="card-body">
            <form id="form-usuario" class="row g-2 mb-3">
              <div class="col-12">
              <input type="text" id="usr-nome" class="form-control" placeholder="Nome" required>
              </div>
              <div class="col-12">
                <input type="email" id="usr-email" class="form-control" placeholder="E-mail" required>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-dark w-100">Adicionar Usuário</button>
              </div>
            </form>
            <ul id="lista-usuarios" class="list-group"></ul>
          </div>
        </div>
      </section>

      <!-- ===================== FILME (Criar Cadastro) ===================== -->
      <section class="col-md-4">
        <div class="card h-100">
          <div class="card-header bg-dark text-white fw-bold">Cadastrar Filme</div>
          <div class="card-body">
            <form id="form-filme" class="row g-2 mb-3">
              <div class="col-12">
                <input type="text" id="fil-titulo" class="form-control" placeholder="Título do Filme" required>
              </div>
              <div class="col-6">
                <select id="fil-genero" class="form-select" required>
                  <option value="acao">Ação</option>
                  <option value="comedia">Comédia</option>
                  <option value="drama">Drama</option>
                  <option value="dorama">Dorama</option>
                  <option value="ficcao">Ficção Científica</option>
                </select>
              </div>
              <div class="col-6">
                <input type="number" id="fil-ano" class="form-control" placeholder="Ano" step="1" min="1888" required>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-dark w-100">Adicionar Filme</button>
              </div>
            </form>
            <ul id="lista-filme" class="list-group"></ul>
          </div>
        </div>
      </section>

      <!-- ===================== COMENTÁRIO (Vincular Usuário + Filme) ===================== -->
      <section class="col-md-4">
        <div class="card h-100">
          <div class="card-header bg-dark text-white fw-bold">Deixar um Comentário</div>
          <div class="card-body">
            <form id="form-comentario" class="row g-2 mb-3">
              
              <!-- Dropdown de Usuários (Preenchido via JS) -->
              <div class="col-12">
                <select id="select-usuario-comentario" class="form-select" required>
                  <option value="">Quem está comentando?</option>
                </select>
              </div>

              <!-- Dropdown de Filmes (Preenchido via JS) -->
              <div class="col-12">
                <select id="select-filme-comentario" class="form-select" required>
                  <option value="">Selecione o filme...</option>
                </select>
              </div>

              <!-- Texto do Comentário -->
              <div class="col-12">
                 <input type="number" id="filme-nota" class="form-control mb-2" placeholder="Nota (0-10)" min="0" max="10" step="0.1">
                <textarea id="comentario-texto" class="form-control" rows="3" placeholder="Escreva seu comentário aqui..." required></textarea>
              </div>

              <div class="col-12">
                <button type="submit" class="btn btn-dark w-100">Publicar</button>
              </div>
            </form>
            <ul id="lista-comentarios" class="list-group"></ul>
          </div>
        </div>
      </section>

    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
